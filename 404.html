<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404: Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="text-center bg-slate-950">
    <main
      class="grid min-h-full place-items-center bg-slate-950 px-6 py-24 sm:py-32 lg:px-8"
    >
      <div class="text-center">
        <p class="font-semibold text-3xl text-blue-600">404</p>
        <h1
          class="mt-4 text-3xl font-bold tracking-tight text-gray-200 sm:text-5xl"
        >
          Page not found
        </h1>
        <p class="mt-6 text-base leading-7 text-gray-500">
          Sorry, we couldn't find the page you're looking for.
        </p>
        <div class="mt-10 flex items-center justify-center gap-x-6">
          <a
            href="https://eshayat102.github.io/eshayat/"
            class="border border-transparent rounded-xl bg-blue-600 px-5 py-4 text-sm font-semibold text-white shadow-sm hover:bg-transparent hover:text-blue-600 hover:border-blue-600 transition-all duration-500"
            >Go back home</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
